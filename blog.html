    const SERIES = [
      { title: "STM32 OTA 업데이트 시스템 구축 A to Z", desc: "부트로더 설계부터 ESP8266 Wi-Fi 다운로드, Flash 파티셔닝, CRC32 검증까지 전 과정을 다루는 시리즈", posts: 5, completed: 3, tags: ["STM32", "OTA", "Bootloader"] },
      { title: "FreeRTOS 실전 패턴 가이드", desc: "Task 설계, Semaphore/Mutex 동기화, 우선순위 역전 해결, Stack 모니터링까지 실무 중심 정리", posts: 4, completed: 2, tags: ["FreeRTOS", "RTOS", "Mutex"] },
      { title: "센서 융합 알고리즘 Deep Dive", desc: "상보필터, 칼만필터, Tilt-Compensated Yaw, Hard-Iron 캘리브레이션 이론과 구현", posts: 3, completed: 1, tags: ["Sensor Fusion", "MPU6050", "Filter"] },
      { title: "임베디드 C 코딩 스탠다드 (MISRA-C)", desc: "방산/자동차 SW 개발에 필수인 MISRA-C:2012 주요 Rule 정리 및 위반 사례 분석", posts: 6, completed: 1, tags: ["MISRA-C", "Static Analysis", "Safety"] },
    ];

    const SNIPPETS = [
      {
        title: "I2C Mutex 보호 패턴 (FreeRTOS)",
        lang: "C",
        code: `osMutexAcquire(i2c1_mutex, osWaitForever);
HAL_I2C_Mem_Read(&hi2c1, ADDR, REG, 1, buf, len, 10);
osMutexRelease(i2c1_mutex);`,
        desc: "다중 Task에서 동일 I2C 버스 접근 시 반드시 Mutex로 보호. HAL Timeout도 설정하여 Hang 방지.",
        tags: ["FreeRTOS", "I2C", "Mutex"]
      },
      {
        title: "상보필터 (Complementary Filter)",
        lang: "C",
        code: `#define ALPHA 0.96f
roll = ALPHA * (roll + gyro_rate_x * dt)
     + (1.0f - ALPHA) * atan2f(accel_y, accel_z) * RAD_TO_DEG;`,
        desc: "자이로 적분(빠른 반응)과 가속도 절대각(드리프트 보정)을 가중 합산. α가 클수록 자이로 의존.",
        tags: ["Filter", "IMU", "Sensor Fusion"]
      },
      {
        title: "CRC32 바이트 단위 계산",
        lang: "C",
        code: `static uint32_t crc32_byte(uint32_t crc, uint8_t data) {
  crc ^= data;
  for (uint32_t i = 0; i < 8U; i++)
    crc = (crc & 1U) ? ((crc >> 1U) ^ 0xEDB88320U) : (crc >> 1U);
  return crc;
}`,
        desc: "OTA 다운로드 시 바이트 단위로 CRC32를 실시간 누적하여 Flash Write 후 무결성 검증에 사용.",
        tags: ["CRC32", "OTA", "Integrity"]
      },
      {
        title: "UART TX Mutex 패턴",
        lang: "C",
        code: `uint32_t uartWrite(uint8_t ch, uint8_t *data, uint32_t len) {
  UART_HandleTypeDef *huart = (ch == 0) ? &huart2 : &huart1;
  osMutexAcquire(uart_tx_mutex, osWaitForever);
  if (HAL_UART_Transmit(huart, data, len, 100) != HAL_OK)
    len = 0;
  osMutexRelease(uart_tx_mutex);
  return len;
}`,
        desc: "다중 Task에서 동시 UART 출력 시 데이터 깨짐 방지. CLI 로그와 텔레메트리가 혼재되는 환경 필수.",
        tags: ["UART", "Mutex", "RTOS"]
      },
      {
        title: "Flash Vector Table 유효성 검증",
        lang: "C",
        code: `static bool valid_image(uint32_t addr, uint32_t size) {
  uint32_t sp = *(__IO uint32_t *)addr;
  uint32_t reset = *(__IO uint32_t *)(addr + 4U);
  if (sp < 0x20000000U || sp > 0x20020000U) return false;
  if ((reset & 0x1U) == 0U) return false;  // Thumb bit
  return true;
}`,
        desc: "OTA 다운로드 이미지의 벡터 테이블을 검증하여 잘못된 바이너리 실행 방지. SP/Reset Handler 범위 체크.",
        tags: ["OTA", "Bootloader", "Safety"]
      }
    ];

    /* ========================================
       STATE
    ======================================== */
    let activeCategory = "all";
    let activeTab = "posts";
    let searchQuery = "";

    /* ========================================
       RENDER FUNCTIONS
    ======================================== */
    function renderCategories() {
      const ul = document.getElementById('category-list');
      ul.innerHTML = CATEGORIES.map(c => `
        <li>
          <button class="cat-btn ${activeCategory === c.id ? 'active' : ''}" data-cat="${c.id}">
            <span class="cat-icon">${c.icon}</span> ${c.label}
          </button>
        </li>
      `).join('');
      ul.querySelectorAll('.cat-btn').forEach(btn => {
        btn.addEventListener('click', () => {
          activeCategory = btn.dataset.cat;
          render();
        });
      });
    }

    function renderTabs() {
      document.querySelectorAll('.tab-btn').forEach(btn => {
        btn.classList.toggle('active', btn.dataset.tab === activeTab);
        btn.onclick = () => { activeTab = btn.dataset.tab; render(); };
      });
    }

    function getLevelClass(level) {
      const map = { Expert: 'level-expert', Advanced: 'level-advanced', Intermediate: 'level-intermediate', Beginner: 'level-beginner' };
      return map[level] || 'level-intermediate';
    }

    function filterPosts() {
      return POSTS.filter(p => {
        const catMatch = activeCategory === "all" || p.category === activeCategory;
        const q = searchQuery.toLowerCase();
        const searchMatch = !q || p.title.toLowerCase().includes(q) || p.tags.some(t => t.toLowerCase().includes(q)) || p.excerpt.toLowerCase().includes(q);
        return catMatch && searchMatch;
      });
    }

    function renderPosts() {
      const filtered = filterPosts();
      const catLabel = CATEGORIES.find(c => c.id === activeCategory)?.label || "All";
      let html = `
        <div class="feed-header">
          <h2>${activeCategory === 'all' ? 'Latest Posts' : catLabel}</h2>
          <span>${filtered.length} posts found</span>
        </div>
      `;
      if (filtered.length === 0) {
        html += `<div class="empty-state"><p>검색 결과가 없습니다.</p></div>`;
      } else {
        filtered.forEach(p => {
          html += `
            <article class="post-card">
              <div class="post-meta">
                <span class="level-badge ${getLevelClass(p.level)}">${p.level}</span>
                <span class="meta-text">⏱ ${p.readTime}</span>
                <span class="meta-text">${p.date}</span>
              </div>
              <h3 class="post-title">${p.title}</h3>
              <p class="post-excerpt">${p.excerpt}</p>
              <div class="post-footer">
                <div class="post-tags">${p.tags.map(t => `<span class="post-tag">#${t}</span>`).join('')}</div>
                <span class="read-more">Read Article →</span>
              </div>
            </article>
          `;
        });
      }
      return html;
    }

    function renderSeries() {
      let html = `
        <div class="feed-header">
          <h2>학습 시리즈</h2>
          <span>${SERIES.length} series</span>
        </div>
        <div class="series-list">
      `;
      SERIES.forEach(s => {
        const pct = Math.round((s.completed / s.posts) * 100);
        html += `
          <div class="series-card">
            <h4>${s.title}</h4>
            <p>${s.desc}</p>
            <div class="series-meta">
              <span>📄 ${s.completed}/${s.posts} posts</span>
              <span>📊 ${pct}% complete</span>
            </div>
            <div class="post-tags" style="margin-top:10px">${s.tags.map(t => `<span class="post-tag">#${t}</span>`).join('')}</div>
            <div class="series-progress"><div class="series-progress-bar" style="width:${pct}%"></div></div>
          </div>
        `;
      });
      html += `</div>`;
      return html;
    }

    function renderSnippets() {
      const q = searchQuery.toLowerCase();
      const filtered = SNIPPETS.filter(s => !q || s.title.toLowerCase().includes(q) || s.tags.some(t => t.toLowerCase().includes(q)));
      let html = `
        <div class="feed-header">
          <h2>Code Snippets</h2>
          <span>${filtered.length} snippets</span>
        </div>
      `;
      if (filtered.length === 0) {
        html += `<div class="empty-state"><p>검색 결과가 없습니다.</p></div>`;
      } else {
        filtered.forEach(s => {
          html += `
            <div class="snippet-card">
              <div class="snippet-header">
                <h4>${s.title}</h4>
                <span class="snippet-lang">${s.lang}</span>
              </div>
              <div class="snippet-code">${escapeHtml(s.code)}</div>
              <div class="snippet-desc">💡 ${s.desc}</div>
              <div class="snippet-tags">${s.tags.map(t => `<span class="post-tag">#${t}</span>`).join('')}</div>
            </div>
          `;
        });
      }
      return html;
    }

    function escapeHtml(str) {
      return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
    }

    function render() {
      renderCategories();
      renderTabs();
      const feed = document.getElementById('feed-content');
      if (activeTab === 'posts') feed.innerHTML = renderPosts();
      else if (activeTab === 'series') feed.innerHTML = renderSeries();
      else if (activeTab === 'snippets') feed.innerHTML = renderSnippets();
    }

    /* ========================================
       EVENT LISTENERS
    ======================================== */
    document.getElementById('search-input').addEventListener('input', e => {
      searchQuery = e.target.value;
      render();
    });

    /* Initial render */
    render();
  </script>
</body>
</html>
