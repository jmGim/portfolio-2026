    .main { max-width: 1200px; margin: 0 auto; padding: 0 24px 80px; display: grid; grid-template-columns: 200px 1fr; gap: 40px }

    /* ===== Modal (same style as index.html) ===== */
    .modal-overlay { position: fixed; inset: 0; z-index: 200; background: rgba(15,23,42,.3); backdrop-filter: blur(6px); display: flex; align-items: flex-end; justify-content: center; opacity: 0; pointer-events: none; transition: opacity .35s }

    .modal-content { width: min(880px, 96vw); max-height: 90vh; background: var(--bg-white); border-radius: 28px 28px 0 0; box-shadow: var(--sh-lg); overflow: hidden; display: flex; flex-direction: column; transform: translateY(100%); transition: transform .45s cubic-bezier(.4,0,.2,1) }

    .modal-handle { width: 40px; height: 5px; border-radius: 3px; background: #d1d5db; position: absolute; top: 8px; left: 50%; transform: translateX(-50%) }
    .modal-header { display: flex; align-items: center; justify-content: space-between; padding: 22px 28px 14px; border-bottom: 1px solid var(--line); position: sticky; top: 0; background: var(--bg-white); z-index: 1 }
    .modal-title { font-weight: 800; font-size: 16px }
    .modal-close { width: 36px; height: 36px; border-radius: 50%; background: rgba(0,0,0,.04); display: grid; place-items: center; font-size: 18px; color: var(--muted); transition: all .2s }

    .modal-body { padding: 28px; overflow-y: auto; flex: 1 }
    .modal-body h2 { font-size: clamp(20px, 3vw, 26px); letter-spacing: -.02em; margin-bottom: 6px; color: var(--text) }
    .modal-body h3 { margin-top: 24px; padding-bottom: 6px; border-bottom: 1px solid var(--line); font-size: 15px; color: var(--text) }
    .modal-body p, .modal-body li { color: var(--text-s); line-height: 1.8; font-size: 14px }
    .modal-body ul { padding-left: 20px }
    .modal-body li { margin-bottom: 4px }
    .modal-body .tag-list { display: flex; flex-wrap: wrap; gap: 5px; margin: 10px 0 16px }
    .modal-body .tag { display: inline-flex; padding: 4px 9px; border-radius: 7px; font-size: 12px; font-weight: 600; background: rgba(14,165,233,.07); color: var(--cyan); border: 1px solid rgba(14,165,233,.13) }
    .modal-body pre { background: #f1f5f9; border: 1px solid var(--line); border-radius: 12px; padding: 16px 20px; font-family: "JetBrains Mono", monospace; font-size: 13px; line-height: 1.7; overflow-x: auto; margin: 12px 0 }
    .modal-body .img-wrap { border-radius: 12px; overflow: hidden; border: 1px solid var(--line); margin: 12px 0 }
    .modal-body .img-wrap img { width: 100%; height: auto; display: block }

    /* ===== Empty ===== */
    .empty-state { padding: 64px 0; text-align: center; border: 1px dashed var(--line); border-radius: 16px; color: var(--muted) }

    /* ===== Footer ===== */
    .blog-footer { border-top: 1px solid var(--line); padding: 28px 24px; text-align: center; color: var(--muted); font-size: 13px }
    .blog-footer-inner { max-width: 1200px; margin: 0 auto; display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 12px }
    .blog-footer a { color: var(--text-s); transition: color .2s }
    .blog-footer a:hover { color: var(--cyan) }

    @media(max-width:800px) {
      .main { grid-template-columns: 1fr }
      .sidebar { position: static }
      .sidebar ul { display: flex; flex-wrap: wrap; gap: 4px }
      .sidebar h3 { display: none }
      .cat-btn { padding: 7px 10px; font-size: 12px; white-space: nowrap }
      .navbar-links { display: none }
    }
  </style>
</head>

    /* ========================================
       CATEGORIES

       snippets 배열: 포스트 내부 코드 스니펫 → Snippets 탭에 자동 추가
    ======================================== */
    const POSTS = [
      {
        id: 1,
        title: "I2C 버스 Hang 현상 분석: MPU6050 + HMC5883L 동시 접근 트러블슈팅",
        excerpt: "FreeRTOS 환경에서 두 센서가 동일 I2C1 버스를 경쟁적으로 접근할 때 발생하는 HAL_BUSY 현상의 원인과 Mutex 기반 해결 기록.",
        category: "troubleshooting",
        level: "Advanced",
        date: "2026. 07. 20",         // ← 날짜 직접 설정
        readTime: "10 min",
        tags: ["I2C", "FreeRTOS", "Mutex", "MPU6050", "HMC5883L"],
        // 포스트 상세 내용 (모달에 표시)
        sections: [
          { type: "h3", text: "🔍 문제 상황" },
          { type: "p", text: "gyroSystemTask와 magSystemTask가 동일 I2C1 버스에서 HAL_I2C_Mem_Read()를 호출할 때, RTOS 컨텍스트 스위칭 타이밍에 의해 간헐적으로 I2C 버스가 HAL_BUSY 상태로 멈추는 현상 발생." },
          { type: "img", src: "https://upload.wikimedia.org/wikipedia/commons/thumb/0/04/I2C_controller-target.svg/640px-I2C_controller-target.svg.png", alt: "I2C 버스 구조도" },
          { type: "h3", text: "📊 원인 분석" },
          { type: "ul", items: [
            "두 Task가 동일 I2C 페리페럴에 비동기 접근 → HAL 내부 Lock 플래그 경합",
            "Task A가 I2C Read 중 컨텍스트 스위칭 → Task B가 같은 I2C에 Read 시도 → HAL_BUSY 반환",
            "오실로스코프 SDA/SCL 파형 확인: ACK 후 STOP 없이 새로운 START 발생"

          { type: "code", lang: "C", title: "I2C Mutex 적용 패턴", code: `// hw.c — 시스템 초기화 시 Mutex 생성
osMutexId_t i2c1_mutex;
void hwInit(void) {
  i2c1_mutex = osMutexNew(NULL);
}

// gyro.c — 센서 읽기 시 Mutex 보호
bool Gyro_Read(gyro_data_t *data) {
  osMutexAcquire(i2c1_mutex, osWaitForever);
  HAL_StatusTypeDef ret = HAL_I2C_Mem_Read(
    &hi2c1, MPU6050_ADDR << 1, 0x3B,
    I2C_MEMADD_SIZE_8BIT, raw, 14, 50);
  osMutexRelease(i2c1_mutex);
  return (ret == HAL_OK);
}` },

                                    ↓
                              Queue Overflow!
                              데이터 유실 → CRC32 불일치

[Passive Mode — 해결]
STM32 → AT+CIPRECVDATA=512 → ESP8266 응답 대기
                              ↓
                        +CIPRECVDATA,512:<data>
                              ↓
                        Flash Write → 다음 청크 요청` },

    return false;
  
  // 이후 데이터는 AT+CIPRECVDATA=N 으로만 수신
  return true;
}

// 청크 단위 동기 수신
uint32_t esp8266_RecvChunk(uint8_t *buf, uint32_t size) {
  char cmd[40];
  snprintf(cmd, sizeof(cmd), "AT+CIPRECVDATA=%lu", size);
  sendATCommand(cmd, "+CIPRECVDATA", 5000);

  if (size < 8U || size > APP_MAX_SIZE) return false;
  
  uint32_t sp    = *(__IO uint32_t *)addr;
  uint32_t reset = *(__IO uint32_t *)(addr + 4U);
  
  // SP가 SRAM 범위 내인지, 8-byte aligned인지
  if (sp < 0x20000000U || sp > 0x20020000U) return false;
  if (sp & 0x7U) return false;
  
  // Reset Handler가 Thumb 모드인지
  if ((reset & 0x1U) == 0U) return false;
  
  // Reset Handler가 APP 영역 내인지
  uint32_t reset_addr = reset & ~1U;
  if (reset_addr < addr || reset_addr >= addr + size)
    return false;
    
  return true;
}` },

#define DT     0.02f   // 샘플링 주기 (50Hz)
#define RAD2DEG 57.2957795f

// Roll 상보필터
float accel_roll = atan2f(accel_y, accel_z) * RAD2DEG;
roll = ALPHA * (roll + gyro_x * DT)
     + (1.0f - ALPHA) * accel_roll;

// Pitch 상보필터
float accel_pitch = atan2f(-accel_x,
  sqrtf(accel_y*accel_y + accel_z*accel_z)) * RAD2DEG;
pitch = ALPHA * (pitch + gyro_y * DT)
      + (1.0f - ALPHA) * accel_pitch;` },

float cos_r = cosf(roll * DEG2RAD);
float sin_r = sinf(roll * DEG2RAD);
float cos_p = cosf(pitch * DEG2RAD);
float sin_p = sinf(pitch * DEG2RAD);

float mag_x_comp = mag_x * cos_p
                 + mag_z * sin_p;
float mag_y_comp = mag_x * sin_r * sin_p
                 + mag_y * cos_r
                 - mag_z * sin_r * cos_p;

float yaw_mag = atan2f(-mag_y_comp, mag_x_comp) * RAD2DEG;

// Yaw 상보필터 (α=0.94)
yaw = 0.94f * (yaw + gyro_z * DT) + 0.06f * yaw_mag;` },

#define KI  0.02f
#define KD  0.15f
#define IMAX 100.0f       // Anti-Windup 제한
#define LPF_ALPHA 0.6f    // 저역 통과 필터 계수

static float err_sum = 0, err_prev = 0;
static float filtered = 0;

float pid_update(float setpoint, float current) {
  float err = setpoint - current;
  
  // I항 Anti-Windup: ±IMAX 범위 제한
  err_sum += err;
  if (err_sum > IMAX) err_sum = IMAX;
  if (err_sum < -IMAX) err_sum = -IMAX;
  
  // PID 출력
  float output = KP * err + KI * err_sum
               + KD * (err - err_prev);
  err_prev = err;
  
  // LPF: 고주파 진동 억제
  filtered = (1.0f - LPF_ALPHA) * filtered
           + LPF_ALPHA * output;
  
  return filtered;
}` },

      { title: "STM32 OTA 시스템 구축 A to Z", desc: "부트로더 설계 → ESP8266 다운로드 → Flash 파티셔닝 → CRC32 검증 전 과정", posts: 5, completed: 3, tags: ["STM32", "OTA", "Bootloader"] },
      { title: "FreeRTOS 실전 패턴 가이드", desc: "Task 설계, Semaphore/Mutex 동기화, 우선순위 역전 해결, Stack 모니터링", posts: 4, completed: 2, tags: ["FreeRTOS", "RTOS", "Mutex"] },

    /* ========================================
       AUTO SNIPPETS — 포스트 내 code 섹션에서 자동 수집
    ======================================== */
    function collectSnippets() {
      const snippets = [];
      POSTS.forEach(post => {
        if (!post.sections) return;
        post.sections.forEach(sec => {
          if (sec.type === 'code') {
            snippets.push({
              title: sec.title || post.title,
              lang: sec.lang || 'C',
              code: sec.code,
              desc: `📄 출처: "${post.title}"`,
              tags: post.tags.slice(0, 3),
              postId: post.id
            });
          }
        });
      });
      return snippets;
    }

    /* ========================================
       STATE
    ======================================== */
    let activeCategory = "all";
    let activeTab = "posts";
    let searchQuery = "";

    /* ========================================
       MODAL
    ======================================== */
    const overlay = document.getElementById('modal-overlay');
    const modalTitle = document.getElementById('modal-title');
    const modalBody = document.getElementById('modal-body');
    const closeBtn = document.getElementById('modal-close');

    function openPostModal(post) {
      modalTitle.textContent = post.title;
      let html = `
        <div class="tag-list">${post.tags.map(t => `<span class="tag">${t}</span>`).join('')}</div>
        <p style="color:var(--muted);font-size:13px;margin-bottom:20px">
          <span class="level-badge ${getLevelClass(post.level)}">${post.level}</span>
          &nbsp; ⏱ ${post.readTime} &nbsp; ${post.date}
        </p>
      `;
      if (post.sections) {
        post.sections.forEach(sec => {
          if (sec.type === 'h3') html += `<h3>${sec.text}</h3>`;
          else if (sec.type === 'p') html += `<p>${sec.text}</p>`;
          else if (sec.type === 'ul') html += `<ul>${sec.items.map(i => `<li>${i}</li>`).join('')}</ul>`;
          else if (sec.type === 'img') html += `<div class="img-wrap"><img src="${sec.src}" alt="${sec.alt}" loading="lazy"></div>`;
          else if (sec.type === 'code') {
            html += `<p style="font-size:13px;font-weight:700;color:var(--cyan);margin-top:12px">${sec.title || ''}</p>`;
            html += `<pre><code>${escapeHtml(sec.code)}</code></pre>`;
          }
        });
      }
      modalBody.innerHTML = html;
      overlay.classList.add('active');
      document.body.style.overflow = 'hidden';
    }
    function closeModal() {
      overlay.classList.remove('active');
      document.body.style.overflow = '';
    }
    closeBtn.addEventListener('click', closeModal);
    overlay.addEventListener('click', e => { if (e.target === overlay) closeModal(); });
    document.addEventListener('keydown', e => { if (e.key === 'Escape') closeModal(); });

    /* ========================================
       RENDER
    ======================================== */
    function renderCategories() {
      const ul = document.getElementById('category-list');
      ul.innerHTML = CATEGORIES.map(c => `
        <li><button class="cat-btn ${activeCategory === c.id ? 'active' : ''}" data-cat="${c.id}">
          ${c.icon ? '<span>'+c.icon+'</span>' : ''} ${c.label}
        </button></li>
      `).join('');
      ul.querySelectorAll('.cat-btn').forEach(btn => {
        btn.addEventListener('click', () => { activeCategory = btn.dataset.cat; render(); });
      });
    }

    function renderTabs() {
      document.querySelectorAll('.tab-btn').forEach(btn => {
        btn.classList.toggle('active', btn.dataset.tab === activeTab);
        btn.onclick = () => { activeTab = btn.dataset.tab; render(); };
      });
    }

    function getLevelClass(l) {
      return { Expert:'level-expert', Advanced:'level-advanced', Intermediate:'level-intermediate', Beginner:'level-beginner' }[l] || 'level-intermediate';
    }

    function filterPosts() {
      return POSTS.filter(p => {
        const catMatch = activeCategory === "all" || p.category === activeCategory;
        const q = searchQuery.toLowerCase();
        const sMatch = !q || p.title.toLowerCase().includes(q) || p.tags.some(t => t.toLowerCase().includes(q)) || p.excerpt.toLowerCase().includes(q);
        return catMatch && sMatch;
      });
    }

    function renderPosts() {
      const filtered = filterPosts();
      const catLabel = CATEGORIES.find(c => c.id === activeCategory)?.label || "All";
      let html = `<div class="feed-header"><h2>${activeCategory === 'all' ? 'Latest Posts' : catLabel}</h2><span>${filtered.length} posts</span></div>`;
      if (!filtered.length) {
        html += `<div class="empty-state"><p>검색 결과가 없습니다.</p></div>`;
      } else {
        filtered.forEach(p => {
          html += `
            <article class="post-card" data-post-id="${p.id}">
              <div class="post-meta">
                <span class="level-badge ${getLevelClass(p.level)}">${p.level}</span>
                <span class="meta-text">⏱ ${p.readTime}</span>
                <span class="meta-text">${p.date}</span>
              </div>
              <h3 class="post-title">${p.title}</h3>
              <p class="post-excerpt">${p.excerpt}</p>
              <div class="post-footer">
                <div class="post-tags">${p.tags.map(t => `<span class="post-tag">#${t}</span>`).join('')}</div>
                <span class="read-more">Read Article →</span>
              </div>
            </article>`;
        });
      }
      return html;
    }

    function renderSeries() {
      let html = `<div class="feed-header"><h2>학습 시리즈</h2><span>${SERIES.length} series</span></div><div class="series-list">`;
      SERIES.forEach(s => {
        const pct = Math.round((s.completed / s.posts) * 100);
        html += `
          <div class="series-card">
            <h4>${s.title}</h4><p>${s.desc}</p>
            <div class="series-meta"><span>📄 ${s.completed}/${s.posts}</span><span>📊 ${pct}%</span></div>
            <div class="post-tags" style="margin-top:8px">${s.tags.map(t => `<span class="post-tag">#${t}</span>`).join('')}</div>
            <div class="series-progress"><div class="series-progress-bar" style="width:${pct}%"></div></div>
          </div>`;
      });
      return html + '</div>';
    }

    function renderSnippets() {
      const snippets = collectSnippets();
      const q = searchQuery.toLowerCase();
      const filtered = snippets.filter(s => !q || s.title.toLowerCase().includes(q) || s.tags.some(t => t.toLowerCase().includes(q)));
      let html = `<div class="feed-header"><h2>Code Snippets</h2><span>${filtered.length} snippets (포스트에서 자동 수집)</span></div>`;
      if (!filtered.length) {
        html += `<div class="empty-state"><p>검색 결과가 없습니다.</p></div>`;
      } else {
        filtered.forEach(s => {
          html += `
            <div class="snippet-card">
              <div class="snippet-header"><h4>${s.title}</h4><span class="snippet-lang">${s.lang}</span></div>
              <div class="snippet-code">${escapeHtml(s.code)}</div>
              <div class="snippet-desc">💡 ${s.desc}</div>
              <div class="post-tags">${s.tags.map(t => `<span class="post-tag">#${t}</span>`).join('')}</div>
            </div>`;
        });
      }
      return html;
    }

    function escapeHtml(s) {
      return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
    }

    function render() {
      renderCategories();
      renderTabs();
      const feed = document.getElementById('feed-content');
      if (activeTab === 'posts') feed.innerHTML = renderPosts();
      else if (activeTab === 'series') feed.innerHTML = renderSeries();
      else if (activeTab === 'snippets') feed.innerHTML = renderSnippets();

      // 포스트 카드 클릭 이벤트 바인딩
      if (activeTab === 'posts') {
        feed.querySelectorAll('.post-card').forEach(card => {
          card.addEventListener('click', (e) => {
            const postId = parseInt(card.dataset.postId);
            const post = POSTS.find(p => p.id === postId);
            if (!post) return;

            // Ctrl+Click → 새 페이지로 이동 (상세 페이지)
            if (e.ctrlKey || e.metaKey) {
              // 별도 상세 페이지가 없으면 모달로 대체
              openPostModal(post);
              return;
            }
            // 일반 클릭 → 모달 열기
            openPostModal(post);
          });
        });
      }
    }

    /* ========================================
       INIT
    ======================================== */
    document.getElementById('search-input').addEventListener('input', e => {
      searchQuery = e.target.value;
      render();
    });
    render();
  </script>
